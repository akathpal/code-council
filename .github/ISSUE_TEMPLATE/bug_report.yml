name: Bug report
description: Report reproducible code-council behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private source code, or security vulnerabilities.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence that reproduces the issue.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: code-council revision
      placeholder: commit SHA or version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, agent CLI versions, and selected models.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Safe logs or screenshots
      description: Redact paths, prompts, source, tokens, and credentials.
